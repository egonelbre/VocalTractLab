<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>VocalTractLab Live</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1d2330;
      }
      canvas#canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        margin: 0;
        border: 0;
        background: #1d2330;
      }
      canvas#canvas:focus { outline: none; }
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <!--
      Cross-origin isolation shim. The wasm build links with
      -sAUDIO_WORKLET=1 -sWASM_WORKERS=1, both of which need
      SharedArrayBuffer. Static hosts like GitHub Pages can't set the
      COOP/COEP headers that gate SAB, so a service worker injects
      them on every response. On first load the worker registers and
      reloads the page; subsequent loads boot already isolated.
    -->
    <script type="text/javascript" src="coi-serviceworker.js"></script>
    <!--
      Pointer Lock API polyfill. Safari/iPadOS doesn't implement
      document.exitPointerLock or Element.requestPointerLock, but
      emscripten's quit handler calls exitPointerLock unconditionally
      on shutdown — without these shims, closing or reloading the tab
      throws a TypeError on iPad and the cleanup chain bails out.
      ImGui doesn't actually use pointer lock here, so empty no-ops
      are sufficient.
    -->
    <script type="text/javascript">
      (function () {
        if (typeof document === "undefined") return;
        if (typeof document.exitPointerLock !== "function") {
          document.exitPointerLock = function () {};
        }
        // requestPointerLock lives on Element in the spec; some engines
        // only expose it on HTMLElement. Patch both prototypes if missing
        // so emscripten's canvas.requestPointerLock() call doesn't
        // explode either.
        var protos = [];
        if (typeof Element !== "undefined") protos.push(Element.prototype);
        if (typeof HTMLElement !== "undefined") protos.push(HTMLElement.prototype);
        protos.forEach(function (proto) {
          if (typeof proto.requestPointerLock !== "function") {
            proto.requestPointerLock = function () {};
          }
        });
      })();
    </script>
    <script type="text/javascript">
      var Module = {
        print: function() {
          return function(text) {
            console.log(Array.prototype.slice.call(arguments).join(' '));
          };
        }(),
        printErr: function(text) {
          console.error(Array.prototype.slice.call(arguments).join(' '));
        },
        canvas: document.getElementById('canvas'),
        setStatus: function() {},
        monitorRunDependencies: function() {},
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>

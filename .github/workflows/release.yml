name: release

# Tag-triggered release pipeline. On `v*` tags:
#   1. Build the Emscripten/WASM live build → deploy to GitHub Pages and
#      attach the static-site bundle to the release.
#   2. Build native binaries for Linux, macOS, and Windows → bundle and
#      attach them to the release.
#   3. Create / update the GitHub Release for the tag.
#
# Native builds use the existing vcpkg-based CMake presets. vcpkg's
# binary cache is wired into the GitHub Actions cache so wxWidgets et
# al. only compile from source on the very first run per platform.
#
# Security note: this workflow does not consume any user-controlled
# github.event fields (issue/PR titles, commit messages, etc.) in
# `run:` steps, so the standard "workflow injection" risks do not
# apply here. All ${{ ... }} substitutions reference workflow-defined
# matrix entries or trusted internal step outputs.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # macOS Developer ID signing + notarization. Disabled until the
  # secrets below are configured in the repository — flip this to
  # "true" to enable. The seven secrets needed:
  #   APPLE_CERT_P12_BASE64      Developer ID Application cert + key
  #                              exported as p12, then `base64 -i ...`
  #   APPLE_CERT_PASSWORD        Password used during the p12 export
  #   APPLE_TEAM_ID              10-char team identifier
  #   APPLE_DEVELOPER_NAME       Common name on the cert, e.g.
  #                              "Egon Elbre"
  #   APPLE_NOTARY_KEY_ID        App Store Connect API key id
  #   APPLE_NOTARY_KEY_ISSUER    API key issuer UUID
  #   APPLE_NOTARY_KEY_BASE64    .p8 private key for the API key,
  #                              base64-encoded
  MACOS_SIGNING_ENABLED: "false"

jobs:
  wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Configure (wasm preset)
        run: cmake --preset wasm

      - name: Build vtl_live
        run: cmake --build --preset wasm

      - name: Stage Pages site
        # Emscripten emits vtl_live.{html,js,wasm,data}. The .js/.wasm/.data
        # references inside the HTML are by basename, so renaming the HTML
        # to index.html keeps the relative loads working. .nojekyll
        # disables Jekyll, which would otherwise drop files that start
        # with an underscore.
        run: |
          mkdir -p site
          cp build/wasm/vtl_live.html  site/index.html
          cp build/wasm/vtl_live.js    site/
          cp build/wasm/vtl_live.wasm  site/
          cp build/wasm/vtl_live.data  site/
          touch site/.nojekyll

      - name: Stage release tarball
        run: |
          mkdir -p artifacts
          tar -C build/wasm -czf "artifacts/vtl_live-wasm-${GITHUB_REF_NAME}.tar.gz" \
            vtl_live.html vtl_live.js vtl_live.wasm vtl_live.data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-wasm
          path: artifacts/

  deploy-pages:
    name: Deploy Pages
    needs: wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  native:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-release
            asset_name: vtl-linux-x64
            archive_ext: tar.gz
          - os: macos-latest
            preset: mac-release
            asset_name: vtl-macos-arm64
            archive_ext: tar.gz
          - os: windows-latest
            preset: win-release
            asset_name: vtl-windows-x64
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Export GitHub Actions cache vars (vcpkg)
        # Required so VCPKG_BINARY_SOURCES=x-gha,readwrite finds the
        # cache service from inside the runner.
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Linux deps
        if: runner.os == 'Linux'
        # wxWidgets' vcpkg port pulls GTK + Wayland + Mesa headers from
        # the system. curl/zip/unzip/tar are needed by vcpkg bootstrap;
        # ubuntu-latest has them pre-installed but listing them keeps
        # this workflow runnable on slimmer images.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build pkg-config autoconf automake autoconf-archive libtool libltdl-dev \
            curl zip unzip tar \
            libgtk-3-dev libwayland-dev libxkbcommon-dev \
            libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev libglu1-mesa-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libdbus-1-dev libsecret-1-dev libsystemd-dev libibus-1.0-dev

      - name: Mac deps
        if: runner.os == 'macOS'
        run: brew install ninja autoconf automake autoconf-archive libtool

      - name: Bootstrap vcpkg
        # Pre-running bootstrap surfaces any failure directly in the
        # workflow log instead of behind cmake's "see vcpkg-bootstrap.log"
        # message. Idempotent — cmake will skip re-bootstrapping.
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./third_party/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          else
            ./third_party/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          fi

      - name: Cache vcpkg source downloads
        # vcpkg fetches each port's upstream tarball into this directory.
        # GitHub.com occasionally returns 502 on archive fetches, and
        # vcpkg's own retry budget (3) is not always enough. Persisting
        # the downloads dir across runs means a transient 502 only has
        # to happen once per port version.
        uses: actions/cache@v5
        with:
          path: third_party/vcpkg/downloads
          key: vcpkg-downloads-${{ runner.os }}-${{ hashFiles('third_party/vcpkg/versions/baseline.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-

      - name: Configure
        # Configure triggers vcpkg's port installs, which fetch source
        # tarballs from third-party hosts. Wrap in a retry so a transient
        # 502 from github.com or a similar mirror does not fail the run.
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          retry_wait_seconds: 30
          timeout_minutes: 60
          command: cmake --preset ${{ matrix.preset }}

      - name: Show vcpkg bootstrap log on failure
        if: failure()
        shell: bash
        run: |
          log="build/${{ matrix.preset }}/vcpkg-bootstrap.log"
          if [ -f "$log" ]; then
            echo "=== $log ==="
            cat "$log"
          fi

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Import Developer ID certificate (macOS)
        if: runner.os == 'macOS' && env.MACOS_SIGNING_ENABLED == 'true'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD:   ${{ secrets.APPLE_CERT_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          # Build a temporary keychain so the cert lives only for this
          # job and doesn't taint the runner's default keychain. Using a
          # random keychain password (uuidgen) means the password never
          # has to be a secret — it's regenerated each run.
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          printf '%s' "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Make the temp keychain searchable in addition to whatever
          # the runner already had on the search list.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          # Allow codesign to use the imported key without an interactive
          # prompt (CI has no TTY).
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f "$CERT_PATH"

      - name: Sign macOS bundles
        if: runner.os == 'macOS' && env.MACOS_SIGNING_ENABLED == 'true'
        env:
          APPLE_TEAM_ID:        ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_NAME: ${{ secrets.APPLE_DEVELOPER_NAME }}
        shell: bash
        run: |
          set -euo pipefail
          # The CMake build already attaches an ad-hoc signature with
          # Resources sealed; --force replaces it with the Developer ID
          # signature. --options runtime enables the hardened runtime,
          # which notarization requires. --timestamp pulls a secure
          # timestamp from Apple's server (also a notarization
          # requirement).
          SIGN_ID="Developer ID Application: $APPLE_DEVELOPER_NAME ($APPLE_TEAM_ID)"
          for app in build/mac-release/vtl_live.app build/mac-release/VocalTractLab2.app; do
            [ -d "$app" ] || continue
            codesign --force --options runtime --timestamp \
              --sign "$SIGN_ID" "$app"
            codesign --verify --strict --verbose=2 "$app"
          done

      - name: Notarize macOS bundles
        if: runner.os == 'macOS' && env.MACOS_SIGNING_ENABLED == 'true'
        env:
          APPLE_NOTARY_KEY_ID:     ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_KEY_ISSUER: ${{ secrets.APPLE_NOTARY_KEY_ISSUER }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          # Notarization happens against a zip; the notary service
          # extracts and inspects the bundle, then publishes a ticket.
          # `stapler staple` writes the ticket back into the .app so
          # the bundle works offline (Gatekeeper checks the staple
          # without contacting Apple).
          KEY_PATH="$RUNNER_TEMP/notary.p8"
          printf '%s' "$APPLE_NOTARY_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          for app in build/mac-release/vtl_live.app build/mac-release/VocalTractLab2.app; do
            [ -d "$app" ] || continue
            ZIP_PATH="$RUNNER_TEMP/$(basename "$app").zip"
            # ditto preserves bundle structure / xattrs better than zip
            # for .app submissions to the notary service.
            ditto -c -k --keepParent "$app" "$ZIP_PATH"
            xcrun notarytool submit "$ZIP_PATH" \
              --key "$KEY_PATH" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_KEY_ISSUER" \
              --wait
            xcrun stapler staple "$app"
            xcrun stapler validate "$app"
            rm -f "$ZIP_PATH"
          done
          rm -f "$KEY_PATH"

      - name: Stage artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p staging
          cp build/linux-release/vtl_live           staging/ 2>/dev/null || true
          cp build/linux-release/VocalTractLab2     staging/ 2>/dev/null || true
          cp -r data                                staging/ 2>/dev/null || true
          mkdir -p artifacts
          tar -C staging -czf "artifacts/${{ matrix.asset_name }}-${GITHUB_REF_NAME}.${{ matrix.archive_ext }}" .

      - name: Stage artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p staging
          cp -R build/mac-release/vtl_live.app          staging/ 2>/dev/null || true
          cp -R build/mac-release/VocalTractLab2.app    staging/ 2>/dev/null || true
          mkdir -p artifacts
          tar -C staging -czf "artifacts/${{ matrix.asset_name }}-${GITHUB_REF_NAME}.${{ matrix.archive_ext }}" .

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Get-ChildItem -Path build/win-release -Recurse -Include vtl_live.exe,VocalTractLab2.exe,*.dll |
            ForEach-Object { Copy-Item $_.FullName -Destination $staging }
          if (Test-Path data) { Copy-Item -Recurse data $staging }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $asset = "artifacts/${{ matrix.asset_name }}-$env:GITHUB_REF_NAME.${{ matrix.archive_ext }}"
          Compress-Archive -Path "$staging/*" -DestinationPath $asset

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.asset_name }}
          path: artifacts/

  release:
    name: Publish Release
    needs: [wasm, native]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
